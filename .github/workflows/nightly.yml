name: Nightly Playwright Tests

on:
  schedule:
    - cron: '0 3 * * 3'  # Runs every Wednesday at 8:30 AM IST (3:00 AM UTC)
  workflow_dispatch:       # Allows manual triggering from GitHub Actions UI

permissions:
  contents: write          # Required to push to gh-pages branch

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    # ─── Restore previous Allure history for trend charts ────────────────────

    - name: Download previous Allure history
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Copy Allure history from previous run
      run: |
        if [ -d "gh-pages/allure/history" ]; then
          mkdir -p allure-results/history
          cp -r gh-pages/allure/history allure-results/
          echo "Allure history restored from previous run"
        else
          echo "No previous history found — first run baseline"
        fi

    # ─── Run tests ───────────────────────────────────────────────────────────

    - name: Run Playwright tests
      run: npx playwright test --grep @login
      env:
        CI: true
      continue-on-error: true  # Publish report even when tests fail

    # ─── Generate Allure Report ───────────────────────────────────────────────

    - name: Generate Allure HTML report
      run: npx allure generate ./allure-results -o ./allure-report
      if: always()

    # ─── Publish to GitHub Pages ──────────────────────────────────────────────

    - name: Prepare gh-pages directory structure
      if: always()
      run: |
        mkdir -p gh-pages-deploy/allure
        cp -r allure-report/. gh-pages-deploy/allure/

    - name: Publish Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        personal_token: ${{ secrets.GH_PAT_NEW }}
        publish_branch: gh-pages
        publish_dir: gh-pages-deploy
        keep_files: true
        commit_message: |
          Allure report — run ${{ github.run_number }}

    # ─── Upload artifacts as backup ───────────────────────────────────────────

    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ github.run_number }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ github.run_number }}
        path: allure-results/
        retention-days: 30
